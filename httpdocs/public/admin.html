<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Admin - Haus Gothensee</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-card { max-width: 1200px; margin: 20px auto; padding: 25px; background: white; border-radius: 12px; font-family: sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-tabs button { padding: 10px 20px; cursor: pointer; border: none; background: #f0f0f0; border-radius: 5px; font-weight: bold; }
        .nav-tabs button.active { background: #007bff; color: white; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: fixed; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 11px; overflow: hidden; }
        th { background: #f8f9fa; }

        .view-section { display: none; }
        .view-section.active { display: block; }
        
        /* Farben für den Serviceplan-Ausdruck */
        .print-meal { padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; display: block; font-weight: bold; border-left: 3px solid #ccc; }
        .p-A { background: #e7f1ff; border-left-color: #007bff; color: #004085; }
        .p-B { background: #e9f7ef; border-left-color: #28a745; color: #155724; }
        .p-C { background: #fff3e6; border-left-color: #fd7e14; color: #856404; }

        .btn-print-row { cursor: pointer; background: #6c757d; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 10px; }
        .btn-print-row:hover { background: #5a6268; }

        @media print { 
            .no-print { display: none; } 
            .admin-card { margin: 0; padding: 0; max-width: 100%; box-shadow: none; }
            .page-break { page-break-after: always; }
            table { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <div class="admin-header no-print">
            <h1>Admin-Zentrale</h1>
            <button class="logout-btn" onclick="logout()">Abmelden</button>
        </div>

        <div class="nav-tabs no-print">
            <button id="btn-users" class="active" onclick="showSection('users')">Zimmer-Verwaltung</button>
            <button id="btn-service" onclick="showSection('service')">Service-Plan (Wochenübersicht)</button>
        </div>

        <div id="sec-users" class="view-section active">
            <div style="margin-bottom: 20px; display: flex; gap: 10px;" class="no-print">
                <input type="text" id="new-room" placeholder="Zimmer-Nr." style="padding: 8px; width: 100px;">
                <button onclick="activateRoom()" style="background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Zimmer Aktivieren</button>
                <button onclick="printAllAccess()" style="background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Alle Zettel drucken</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width:12%;">Zimmer</th>
                        <th style="width:18%;">Passwort</th>
                        <th style="width:10%;">Tisch</th>
                        <th style="width:10%;">Durchg.</th>
                        <th style="width:10%;">Pax</th>
                        <th style="width:40%;">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="user-list"></tbody>
            </table>
            <button onclick="saveAssignments()" style="width:100%; margin-top:15px; padding:12px; background:#28a745; color:white; border:none; cursor:pointer; font-weight:bold;" class="no-print">Speichern & Übernehmen</button>
        </div>

        <div id="sec-service" class="view-section">
            <div class="no-print" style="margin-bottom:15px; display: flex; gap: 10px; align-items: center;">
                <label>Durchgang filtern:</label>
                <select id="filter-slot" onchange="renderServicePlan()" style="padding: 5px;">
                    <option value="1">Durchgang 1</option>
                    <option value="2">Durchgang 2</option>
                    <option value="3">Durchgang 3</option>
                </select>
                <button onclick="window.print()" style="padding: 5px 15px;">Druckansicht öffnen</button>
            </div>
            <div id="service-plan-container"></div>
        </div>
    </div>

    <script src="menu.js"></script>
    <script>
        let currentUsers = [];
        // Reihenfolge von Mittwoch bis Dienstag
        const weekDaysOrder = ["Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag", "Montag", "Dienstag"];
        
        function getWeek() { return (Math.floor((new Date() - new Date("2024-01-01")) / (7*24*60*60*1000)) % 6) + 1; }
        
        async function loadData() {
            const res = await fetch('/api/admin/users');
            currentUsers = await res.json();
            renderUserTable();
        }

        function renderUserTable() {
            document.getElementById('user-list').innerHTML = currentUsers.map((u, i) => `
                <tr>
                    <td><b>Zi. ${u.room}</b></td>
                    <td><input type="password" value="${u.pw}" onchange="currentUsers[${i}].pw=this.value" style="width:90%; padding:2px;"></td>
                    <td><input type="number" value="${u.table||''}" onchange="currentUsers[${i}].table=this.value" style="width:40px;"></td>
                    <td><input type="number" value="${u.slot||''}" onchange="currentUsers[${i}].slot=this.value" style="width:40px;"></td>
                    <td><input type="number" value="${u.pax||1}" onchange="currentUsers[${i}].pax=this.value" style="width:30px;"></td>
                    <td>
                        <button class="btn-print-row" onclick="printSingleAccess(${i})">🖨️ Zettel drucken</button>
                        <button onclick="deleteUser('${u.room}')" style="color:#dc3545; margin-left:15px; border:none; background:none; cursor:pointer; font-size:10px;">Löschen</button>
                    </td>
                </tr>`).join('');
        }

        // --- DRUCK-FUNKTIONEN FÜR ZUGANGSZETTEL ---
        function printSingleAccess(index) {
            const u = currentUsers[index];
            const html = generateAccessHtml(u);
            const win = window.open('', '', 'width=600,height=600');
            win.document.write(`<html><body style="margin:0;">${html}</body></html>`);
            win.document.close();
            win.focus();
            setTimeout(() => { win.print(); win.close(); }, 250);
        }

        function printAllAccess() {
            let html = currentUsers.map(u => `<div class="page-break">${generateAccessHtml(u)}</div>`).join('');
            const win = window.open('', '', 'width=800,height=900');
            win.document.write(`<html><head><style>@media print {.page-break {page-break-after: always;}}</style></head><body style="margin:0;">${html}</body></html>`);
            win.document.close();
            win.focus();
            setTimeout(() => { win.print(); win.close(); }, 250);
        }

        function generateAccessHtml(u) {
            return `
            <div style="font-family:sans-serif; padding:40px; border:3px solid #000; text-align:center; max-width:450px; margin:40px auto; border-radius:15px;">
                <h1 style="margin:0; font-size:2em;">Haus Gothensee</h1>
                <p style="font-size:1.1em; color:#555; margin-top:5px;">Ihr persönlicher Zugang zum Speiseplan</p>
                <hr style="margin:20px 0;">
                <div style="background:#f2f2f2; padding:25px; border-radius:10px; margin:20px 0; border:1px solid #ccc;">
                    <p style="font-size:1.4em; margin:0;">Zimmer: <strong style="color:#007bff;">${u.room}</strong></p>
                    <p style="font-size:1.4em; margin:15px 0 0 0;">Passwort-Code: <br>
                       <strong style="font-family:monospace; letter-spacing:3px; font-size:1.6em; background:white; padding:5px 10px; border:1px solid #aaa;">${u.pw}</strong>
                    </p>
                </div>
                <p style="font-size:0.9em; line-height:1.4;">Bitte bewahren Sie diesen Zettel sicher auf. <br>Sie benötigen diese Daten für jede Essensbestellung.</p>
                <p style="color:#888; font-size:0.7em; margin-top:40px;">Gedruckt: ${new Date().toLocaleString('de-DE')}</p>
            </div>`;
        }

        // --- SERVICEPLAN RENDERN ---
        async function renderServicePlan() {
            const slot = document.getElementById('filter-slot').value;
            const week = getWeek();
            const res = await fetch('/api/admin/orders');
            const orders = await res.json();
            const weekOrders = orders[week] || {};
            const filtered = currentUsers.filter(u => u.slot == slot).sort((a,b) => (a.table||99) - (b.table||99));

            let h = `<h2 style="text-align:center;">Service-Plan Woche ${week} | Durchgang ${slot}</h2>`;
            h += `<table><thead><tr><th style="width:40px;">Tisch</th><th style="width:60px;">Zimmer</th>`;
            weekDaysOrder.forEach(d => h += `<th>${d}</th>`);
            h += `</tr></thead><tbody>`;
            
            filtered.forEach(u => {
                h += `<tr><td><b style="font-size:1.4em;">${u.table||'?'}</b></td><td>Zi. ${u.room}<br><small>(${u.pax} Pers.)</small></td>`;
                weekDaysOrder.forEach(day => {
                    let mH = "";
                    if(weekOrders[u.room]) {
                        Object.keys(weekOrders[u.room].selection).filter(id => {
                            if (!fullMenuData[week][day]) return false;
                            return fullMenuData[week][day].find(m => m.id === id);
                        }).forEach(id => {
                            let m = fullMenuData[week][day].find(x => x.id === id);
                            mH += `<span class="print-meal p-${m.type}">${weekOrders[u.room].selection[id]}x ${m.type}</span>`;
                        });
                    }
                    h += `<td>${mH || "-"}</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('service-plan-container').innerHTML = h + "</tbody></table>";
        }

        // --- ALLGEMEINE ADMIN LOGIK ---
        async function saveAssignments() {
            await fetch('/api/admin/save-tables', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ assignments: currentUsers }) 
            });
            alert("Daten erfolgreich gespeichert!");
        }

        async function activateRoom() {
            const r = document.getElementById('new-room').value;
            if(!r) return alert("Zimmernummer fehlt!");
            await fetch('/api/admin/activate', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ room: r }) 
            });
            document.getElementById('new-room').value = ""; 
            loadData();
        }

        async function deleteUser(r) { 
            if(confirm(`Zimmer ${r} wirklich löschen?`)) { 
                await fetch(`/api/admin/users/${r}`, { method: 'DELETE' }); 
                loadData(); 
            } 
        }

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        function showSection(name) {
            document.querySelectorAll('.view-section, .nav-tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById('sec-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
            if(name === 'service') renderServicePlan();
        }

        window.onload = loadData;
    </script>
</body>
</html>
